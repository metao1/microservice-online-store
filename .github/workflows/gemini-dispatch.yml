name: Gemini Dispatch

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  issue_comment:
    types:
      - created
  pull_request_review_comment:
    types:
      - created
  pull_request_review:
    types:
      - submitted

defaults:
  run:
    shell: bash

jobs:
  dispatch:
    if: >-
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)
      || (
        github.event.sender.type == 'User'
        && startsWith(github.event.comment.body || github.event.review.body, '@gemini-cli')
        && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association || github.event.review.author_association)
      )
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      issues: write
      pull-requests: write
    outputs:
      command: ${{ steps.extract_command.outputs.command }}
      additional_context: ${{ steps.extract_command.outputs.additional_context }}

    steps:
      - name: Mint identity token
        id: mint_identity_token
        if: ${{ vars.APP_ID }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: read
          permission-issues: write
          permission-pull-requests: write

      - name: Extract command
        id: extract_command
        uses: actions/github-script@v7
        env:
          EVENT_TYPE: ${{ github.event_name }}.${{ github.event.action }}
          REQUEST: ${{ github.event.comment.body || github.event.review.body || '' }}
        with:
          script: |
            const eventType = process.env.EVENT_TYPE;
            const request = process.env.REQUEST;

            if (eventType.startsWith('pull_request.')) {
              core.setOutput('command', 'review');
              return;
            }

            if (request.startsWith('@gemini-cli /review')) {
              core.setOutput('command', 'review');
              core.setOutput(
                'additional_context',
                request.replace(/^@gemini-cli \/review/, '').trim()
              );
              return;
            }

            core.setOutput('command', 'fallthrough');

      - name: Acknowledge request
        if: ${{ github.event_name != 'pull_request' && steps.extract_command.outputs.command == 'review' }}
        env:
          GITHUB_TOKEN: ${{ steps.mint_identity_token.outputs.token || github.token }}
          ISSUE_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
          MESSAGE: >-
            Hi @${{ github.actor }}, I've received your Gemini review request and
            I'm working on it now. You can follow the run here:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: gh issue comment "${ISSUE_NUMBER}" --body "${MESSAGE}" --repo "${REPOSITORY}"

  review:
    needs: dispatch
    if: ${{ needs.dispatch.outputs.command == 'review' }}
    uses: ./.github/workflows/gemini-review.yml
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    with:
      additional_context: ${{ needs.dispatch.outputs.additional_context }}
    secrets: inherit

  fallthrough:
    needs:
      - dispatch
      - review
    if: ${{ always() && !cancelled() && (failure() || needs.dispatch.outputs.command == 'fallthrough') && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Mint identity token
        id: mint_identity_token
        if: ${{ vars.APP_ID }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: read
          permission-issues: write
          permission-pull-requests: write

      - name: Report failure
        env:
          GITHUB_TOKEN: ${{ steps.mint_identity_token.outputs.token || github.token }}
          ISSUE_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
          MESSAGE: >-
            I couldn't process this Gemini request. Please check the workflow logs:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: gh issue comment "${ISSUE_NUMBER}" --body "${MESSAGE}" --repo "${REPOSITORY}"
