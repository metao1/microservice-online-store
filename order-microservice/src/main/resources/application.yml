management:
  otlp:
    metrics:
      export:
        enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    export:
      enabled: true
      otlp:
        enabled: true
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  observations:
    annotations:
      enabled: true
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
          transport: http
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      show-components: always
      group:
        liveness:
          include: livenessState,ping
        readiness:
          include: readinessState,db,diskSpace

spring:
  threads:
    virtual:
      enabled: ${VIRTUAL_THREADS_ENABLED:false}
  web:
    error:
      include-message: always
      include-binding-errors: always
  application:
    name: order-microservice
  kafka:
    bootstrap-servers: ${BOOTSTRAP_SERVERS}
    listener:
      ack-mode: manual_immediate
      observation-enabled: true
    template:
      observation-enabled: true
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL}
      basic.auth.credentials.source: USER_INFO
      basic.auth.user.info: ${SCHEMA_REGISTRY_AUTH}
      security.protocol: ${SECURITY_PROTOCOL}
      ssl.truststore.type: ${SASL_TRUSTSTORE_TYPE}
      ssl.endpoint.identification.algorithm: "https"
      ssl.truststore.location: ${SASL_TRUSTSTORE_LOCATION}
      ssl.keystore.type: ${SASL_KEYSTORE_TYPE}
      ssl.keystore.location: ${SASL_KEYSTORE_LOCATION}
      # Enale when using SASL
      #sasl.mechanism: ${SASL_MECHANISM}
      #ssl.truststore.password: ${TRUSTSTORE_PASSWORD}
      #ssl.keystore.password: ${KEYSTORE_PASSWORD}
      #sasl.jaas.config: >
      #  org.apache.kafka.common.security.scram.ScramLoginModule required username="${SASL_USERNAME}" password="${SASL_PASSWORD}";
    consumer:
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      isolation-level: read_committed
      auto-offset-reset: none
      enable-auto-commit: false
      group-id: ${spring.application.name}-group
      properties:
        session.timeout.ms: 30000
        max.poll.interval.ms: 300
        heartbeat.interval.ms: 1000
        auto.offset.reset: earliest
        allow.auto.create.topics: "true"
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: io.confluent.kafka.serializers.protobuf.KafkaProtobufDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.protobuf.KafkaProtobufSerializer
      properties:
        enable.idempotence: true
      transaction-id-prefix: ${INSTANCE_ID:${spring.application.name}}-tx-
  output.ansi.enabled: ALWAYS
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    hikari:
      auto-commit: false
      minimum-idle: 5
      maximum-pool-size: 10
      connection-timeout: 20000
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    outOfOrder: false
    locations: classpath:migration
    clean-disabled: true
    validate-on-migrate: true
  jpa:
    database: POSTGRESQL
    open-in-view: false
    generate-ddl: false
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        connection:
          provider_disables_autocommit: true
        temp:
          use_jdbc_metadata_defaults: false

app:
  api:
    version: ${API_VERSION:1.0}
    cors:
      enabled: ${CORS_ENABLED:true}
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
      allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:}
      allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
      allowed-headers: ${CORS_ALLOWED_HEADERS:*}
      exposed-headers: ${CORS_EXPOSED_HEADERS:}
      allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
      max-age: ${CORS_MAX_AGE:30m}
  order:
    vat:
      # Integer VAT rate applied when computing order totals (e.g. 21 for 21 %).
      # Defaults to 0 so unconfigured environments keep net-priced totals.
      percentage: ${VAT_PERCENTAGE:0}

kafka:
  enabled: ${KAFKA_ENABLED:true}
  admin:
    compression-type: zstd
  topic:
    order-created:
      id: "order-created-id"
      name: "order-created"
      group-id: "order-created-group-order"
      class-path: "com.metao.book.shared.OrderCreatedEvent"
    order-updated:
      id: "order-updated-id"
      name: "order-updated"
      group-id: "order-updated-group"
      class-path: "com.metao.book.shared.OrderUpdatedEvent"
    order-payment:
      id: "order-payment-id"
      name: "order-payment"
      group-id: "order-payment-group"
      class-path: "com.metao.book.shared.OrderPaymentUpdatedEvent"
    product-updated:
      id: "product-updated-id"
      name: "product-updated"
      group-id: "product-updated-group"
      class-path: "com.metao.book.shared.ProductUpdatedEvent"

logging:
  pattern.console: "%clr(%d{HH:mm:ss.SSS}){blue} %clr(---){faint} %clr([%t]){yellow} %clr([trace=%X{traceId:-},span=%X{spanId:-}]){magenta} %clr(:){red} %clr(%m){faint}%n"
  level:
    org.apache.kafka.clients.consumer.ConsumerConfig: WARN
    io.confluent.kafka.serializers.KafkaProtobufDeserializerConfig: WARN
    org.springframework.data: INFO
    org.springframework.boot.autoconfigure: ERROR
    org.hibernate: ERROR

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 20
        failureRateThreshold: 50
        slowCallDurationThreshold: 2s
        slowCallRateThreshold: 50
        waitDurationInOpenState: 10s
    instances:
      outbound:
        base-config: default
