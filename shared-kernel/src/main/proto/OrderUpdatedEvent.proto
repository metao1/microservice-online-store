syntax = "proto3";

package com.metao.book;
import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_package = "com.metao.book.shared";

message OrderUpdatedEvent {
  string id = 1;
  // Last updated date.
  optional google.protobuf.Timestamp update_time = 8;
  string userId = 10;
  string sku = 2;
  Status status = 3;
  double quantity = 4;
  double price = 5;
  string currency = 6;
  enum Status {
    CREATED = 0;
    PENDING_PAYMENT = 1;
    PAID = 2;
    PAYMENT_FAILED = 3;
    PROCESSING = 4;
    SHIPPED = 5;
    DELIVERED = 6;
    CANCELLED = 7;
  };

  message UUID {
    // typedef string
  }
}

