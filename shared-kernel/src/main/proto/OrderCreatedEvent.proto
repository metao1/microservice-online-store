syntax = "proto3";

package com.metao.book;
import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_package = "com.metao.book.shared";

message OrderCreatedEvent {
  string id = 1;
  Status status = 3;
  // Created date.
  google.protobuf.Timestamp create_time = 7;
  // Last updated date.
  optional google.protobuf.Timestamp update_time = 8;
  string userId = 10;
  repeated OrderItem items = 11;

  message OrderItem {
    string sku = 1;
    string product_title = 2;
    double quantity = 3;
    double price = 4;
    string currency = 5;
  }

  enum Status {
    CREATED = 0;
    PENDING_PAYMENT = 1;
    PAID = 2;
    PAYMENT_FAILED = 3;
    PROCESSING = 4;
    SHIPPED = 5;
    DELIVERED = 6;
    CANCELLED = 7;
  };

  message UUID {
    // typedef string
  }
}
